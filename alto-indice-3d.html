<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Alto índice 3D · Car & Era</title>
<style>
  :root{ --beige:#c79a66; --ink:#15110c; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#15110c;font-family:'Outfit',system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none}
  #wrap{position:relative;width:100%;height:100%}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  /* viñeta de estudio (sensación macro / fotografía de producto) */
  .vignette{position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse 75% 70% at 50% 46%,transparent 55%,rgba(0,0,0,.55) 100%)}
  .ui{position:absolute;inset:0;pointer-events:none;z-index:5}

  .chips{position:absolute;top:12px;left:0;right:0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 10px;pointer-events:auto}
  .chip{min-height:40px;padding:0 14px;border:1px solid rgba(255,255,255,.16);background:rgba(28,24,18,.6);border-radius:100px;color:#e7ddcd;font-family:inherit;font-weight:600;font-size:12.5px;cursor:pointer;backdrop-filter:blur(8px);transition:all .25s}
  .chip.on{background:var(--beige);border-color:var(--beige);color:#1a140c}

  .ruler{position:absolute;display:flex;align-items:center;gap:7px;transform:translate(-50%,-50%);z-index:6;opacity:0;transition:opacity .4s}
  .ruler .bar{width:2px;background:#e7d8bf;box-shadow:0 0 6px rgba(0,0,0,.6)}
  .ruler .val{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:20px;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8);white-space:nowrap}
  .ruler .val small{display:block;font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;color:#cdbfa8}

  .verdict{position:absolute;bottom:62px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:600;color:#efe7d8;background:rgba(16,12,8,.55);padding:5px 13px;border-radius:9px;backdrop-filter:blur(6px);white-space:nowrap}

  .ctrl{position:absolute;left:0;right:0;bottom:0;padding:11px 14px calc(11px + env(safe-area-inset-bottom));pointer-events:auto;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tip{font-size:11px;color:#a99f8c}
  .tg{min-height:40px;padding:0 14px;border:1px solid rgba(255,255,255,.18);background:rgba(28,24,18,.5);border-radius:100px;color:#e7ddcd;font-family:inherit;font-weight:600;font-size:11.5px;cursor:pointer}
  .tg.on{background:#fff;border-color:#fff;color:var(--ink)}

  .load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#8c8270;font-size:13px;z-index:4}
  .fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#cbbfae;font-size:13px;text-align:center;padding:24px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="vignette"></div>
  <div class="load" id="load">Cargando armazón…</div>
  <div class="ui">
    <div class="chips" id="chips"></div>
    <div class="ruler" id="ruler"><div class="bar" id="rbar"></div><div class="val" id="rval">9.0<small>mm borde</small></div></div>
    <div class="verdict" id="verdict">Borde más grueso · referencia</div>
  </div>
  <div class="ctrl">
    <span class="tip">Gira con el dedo</span>
    <button class="tg" id="tgGhost">Comparar con CR-39</button>
  </div>
  <div class="fallback" id="fallback">No se pudo cargar la vista 3D.<br>A mayor índice, el borde del lente es más delgado con la misma graduación.</div>
</div>

<script type="importmap">
{ "imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';

let renderer,scene,camera,controls,frame,mount,lensA,lensB,lensMat,ghostA,ghostB,ghostMat;
let openings=null, framed=false;
const cv=document.getElementById('cv');
let running=true, etCur=0.5, etTarget=0.5, lastBuilt=-1, showGhost=false, camR=6;
const lerp=(a,b,k)=>a+(b-a)*k, clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const easeIO=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

// vista ¾ que YA muestra el canto (azimut, polar) + vista de canto pleno
const VIEW_34={az:-0.74,po:1.24}, VIEW_EDGE={az:-1.32,po:1.46};
let camAz=VIEW_34.az, camPo=VIEW_34.po;
let camTw=null;  // {fromAz,fromPo,toAz,toPo,t0,dur,then}

const MATS=[
  {l:'CR-39 · 1.49', mm:9.0, et:0.52, vd:'Borde más grueso · referencia'},
  {l:'1.60',         mm:6.3, et:0.36, vd:'Borde 30% más delgado'},
  {l:'1.67',         mm:4.9, et:0.27, vd:'Borde 45% más delgado'},
  {l:'1.74',         mm:3.6, et:0.19, vd:'Borde 60% más delgado · el más delgado'},
];
let cur=0; const ET_REF=MATS[0].et;

function lensProfile(et){
  const R=1.0, ct=0.07, N=26, pts=[];
  for(let i=0;i<=N;i++){ const r=R*i/N; pts.push(new THREE.Vector2(r, ct/2+(et-ct)/2*Math.pow(r/R,2))); }
  for(let i=N;i>=0;i--){ const r=R*i/N; pts.push(new THREE.Vector2(r, -(ct/2+(et-ct)/2*Math.pow(r/R,2)))); }
  return pts;
}
function buildLensGeo(et){ const g=new THREE.LatheGeometry(lensProfile(et),84); g.rotateX(Math.PI/2); g.computeVertexNormals(); return g; }

function measureOpenings(meshes){
  const v=new THREE.Vector3(), mk0=()=>({mnx:1e9,mxx:-1e9,mny:1e9,mxy:-1e9,mnz:1e9,mxz:-1e9});
  const L=mk0(),R=mk0(); let any=false;
  meshes.forEach(m=>{ if(!m.geometry?.attributes?.position)return; m.updateWorldMatrix(true,true); const p=m.geometry.attributes.position;
    for(let i=0;i<p.count;i++){ v.fromBufferAttribute(p,i).applyMatrix4(m.matrixWorld); any=true; const b=v.x<0?L:R;
      b.mnx=Math.min(b.mnx,v.x);b.mxx=Math.max(b.mxx,v.x);b.mny=Math.min(b.mny,v.y);b.mxy=Math.max(b.mxy,v.y);b.mnz=Math.min(b.mnz,v.z);b.mxz=Math.max(b.mxz,v.z); } });
  if(!any) return null;
  const mk=b=>({cx:(b.mnx+b.mxx)/2,cy:(b.mny+b.mxy)/2,cz:(b.mnz+b.mxz)/2,rx:(b.mxx-b.mnx)/2,ry:(b.mxy-b.mny)/2});
  return {L:mk(L),R:mk(R)};
}

function init(){
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  scene=new THREE.Scene(); scene.background=new THREE.Color('#17120c');
  const pmrem=new THREE.PMREMGenerator(renderer);
  scene.environment=pmrem.fromScene(new RoomEnvironment(),0.035).texture;

  camera=new THREE.PerspectiveCamera(34,1,0.1,100);
  controls=new OrbitControls(camera,cv);
  controls.enableDamping=true; controls.dampingFactor=.1; controls.enablePan=false; controls.enableZoom=false;
  controls.minPolarAngle=Math.PI*0.18; controls.maxPolarAngle=Math.PI*0.86;
  controls.addEventListener('start',()=>{ camTw=null; });
  controls.addEventListener('change',()=>{ if(!camTw){ const s=new THREE.Spherical().setFromVector3(camera.position); camAz=s.theta; camPo=s.phi; } });

  // iluminación de estudio cálido
  RectAreaLightUniformsLib.init();
  scene.add(new THREE.HemisphereLight('#3a3324','#0a0806',0.5));
  const key=new THREE.DirectionalLight('#ffe7c4',2.3); key.position.set(2.4,3.2,3); scene.add(key);
  const rim=new THREE.DirectionalLight('#9fc4ff',1.1); rim.position.set(-3,1.5,-2.5); scene.add(rim);
  const fill=new THREE.DirectionalLight('#fff',0.35); fill.position.set(-1.5,-1,2.5); scene.add(fill);
  // softbox: reflejo suave de fotografía de producto sobre el vidrio
  const soft1=new THREE.RectAreaLight('#fff4e0', 14, 3.2, 1.8); soft1.position.set(0.6,2.1,3); soft1.lookAt(0,0,0); scene.add(soft1);
  const soft2=new THREE.RectAreaLight('#cfe0ff', 6, 2.4, 2.4); soft2.position.set(-2.6,0.4,1.6); soft2.lookAt(0,0,0); scene.add(soft2);

  mount=new THREE.Group(); scene.add(mount);   // grupo en el origen: los lentes van aquí (coords de mundo)
  // mica de muestra: vidrio claro pero con cuerpo visible; el canto se lee como anillo
  lensMat=new THREE.MeshPhysicalMaterial({ color:'#d2e2ec', metalness:0, roughness:0.10,
    transmission:0.5, thickness:1.6, ior:1.55, clearcoat:1, clearcoatRoughness:0.06,
    attenuationColor:new THREE.Color('#8fb6cc'), attenuationDistance:0.8, iridescence:0.45, iridescenceIOR:1.3, envMapIntensity:1.2, transparent:true });
  ghostMat=new THREE.MeshStandardMaterial({ color:'#c2ccd6', roughness:.55, transparent:true, opacity:.22, depthWrite:false });

  new GLTFLoader().load('models/glasses.glb', onFrame, undefined, (e)=>{ console.warn('GLB',e); document.getElementById('load').style.display='none'; buildProcedural(); });

  resize(); window.addEventListener('resize',resize);
  document.getElementById('tgGhost').onclick=()=>{ showGhost=!showGhost; document.getElementById('tgGhost').classList.toggle('on',showGhost); applyGhost(); };
  document.addEventListener('visibilitychange',()=>{ running=!document.hidden; if(running) loop(); });
  buildChips(); setMat(0,true);
  loop();
}

function onFrame(gltf){
  const root=gltf.scene;
  let box=new THREE.Box3().setFromObject(root), size=box.getSize(new THREE.Vector3());
  root.scale.setScalar(2.9/Math.max(size.x,1e-6));
  box=new THREE.Box3().setFromObject(root); root.position.sub(box.getCenter(new THREE.Vector3()));
  const lensMeshes=[],allMeshes=[]; root.traverse(o=>{ if(o.isMesh){ allMeshes.push(o); if(/lens|lente/i.test(o.name)) lensMeshes.push(o);
    if(o.material){ o.material=o.material.clone(); o.material.metalness=1.0; o.material.roughness=0.34; if(o.material.color) o.material.color.setHex(0x4a4540); } } });
  openings = lensMeshes.length ? measureOpenings(lensMeshes) : (()=>{ const o=measureOpenings(allMeshes); if(o){ ['L','R'].forEach(k=>{o[k].rx*=0.8;o[k].ry*=0.8;}); } return o; })();
  lensMeshes.forEach(m=>m.visible=false);
  frame=root; scene.add(root);
  document.getElementById('load').style.display='none';
  if(openings){ mountLenses(); framed=true; }
  else buildProcedural();
  fitCamera();
}

function buildProcedural(){
  // respaldo: si el GLB falla, mostramos el lente con un aro fino (no ideal, pero funcional)
  const grp=new THREE.Group(); scene.add(grp); frame=grp;
  openings={ L:{cx:-0.95,cy:0,cz:0,rx:0.62,ry:0.72}, R:{cx:0.95,cy:0,cz:0,rx:0.62,ry:0.72} };
  ['L','R'].forEach(k=>{ const o=openings[k]; const t=new THREE.Mesh(new THREE.TorusGeometry(1,0.05,16,72),new THREE.MeshStandardMaterial({color:'#4a4540',metalness:.95,roughness:.32})); t.scale.set(o.rx,o.ry,1); t.position.set(o.cx,o.cy,o.cz); grp.add(t); });
  mountLenses(); framed=true; fitCamera();
}

function mountLenses(){
  const mk=(o)=>{ const m=new THREE.Mesh(buildLensGeo(etCur),lensMat); m.scale.set(o.rx,o.ry,1); m.position.set(o.cx,o.cy,o.cz); mount.add(m); return m; };
  lensA=mk(openings.L); lensB=mk(openings.R); lastBuilt=etCur;
  const mkg=(o)=>{ const m=new THREE.Mesh(buildLensGeo(ET_REF),ghostMat); m.scale.set(o.rx,o.ry,1); m.position.set(o.cx,o.cy,o.cz); m.visible=false; mount.add(m); return m; };
  ghostA=mkg(openings.L); ghostB=mkg(openings.R);
  applyGhost();
}

function buildChips(){
  document.getElementById('chips').innerHTML=MATS.map((m,i)=>'<button class="chip'+(i===0?' on':'')+'" data-i="'+i+'">'+m.l+'</button>').join('');
  document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>setMat(+c.dataset.i));
}
function setMat(i,silent){
  cur=i; const m=MATS[i];
  document.querySelectorAll('.chip').forEach((c,j)=>c.classList.toggle('on',j===i));
  etTarget=m.et;
  document.getElementById('verdict').innerHTML='<b>'+m.mm.toFixed(1)+' mm</b> · '+m.vd;
  document.getElementById('rval').innerHTML=m.mm.toFixed(1)+'<small>mm borde</small>';
  applyGhost();
  if(!silent && framed){ // la cámara gira hacia el canto para mostrar el grosor, luego regresa
    tweenCam(VIEW_EDGE,820,()=>{ setTimeout(()=>tweenCam(VIEW_34,820,null),520); });
  }
}
function applyGhost(){ const on=showGhost && cur!==0; if(ghostA){ghostA.visible=on;ghostB.visible=on;} }

function tweenCam(to,dur,then){ camTw={fromAz:camAz,fromPo:camPo,toAz:to.az,toPo:to.po,t0:performance.now(),dur,then}; controls.enabled=false; }
function applyCam(){
  const s=new THREE.Spherical(camR, clamp(camPo,0.2,2.9), camAz);
  camera.position.setFromSpherical(s); camera.lookAt(0,0,0);
}

function fitCamera(){
  const halfW=1.6,halfH=1.25,vFov=camera.fov*Math.PI/180;
  camR=Math.max(halfH/Math.tan(vFov/2), halfW/(Math.tan(vFov/2)*camera.aspect))*1.18;
  applyCam(); controls.update();
}
function resize(){ const w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); fitCamera(); }

function placeRuler(){
  const r=document.getElementById('ruler');
  if(!framed){ r.style.opacity=0; return; }
  // regla flotante en el borde superior del lente derecho (coords de mundo)
  const o=openings.R, top=new THREE.Vector3(o.cx+o.rx*0.55, o.cy+o.ry+0.08, o.cz+etCur*0.5);
  const v=top.clone().project(camera);
  if(v.z>=1){ r.style.opacity=0; return; }
  const x=(v.x*0.5+0.5)*cv.clientWidth, y=(-v.y*0.5+0.5)*cv.clientHeight;
  r.style.left=x+'px'; r.style.top=y+'px'; r.style.opacity=1;
  document.getElementById('rbar').style.height=(9+etCur*42).toFixed(0)+'px';
}

function loop(){
  if(!running) return; requestAnimationFrame(loop);
  // morph físico del lente
  etCur=lerp(etCur,etTarget,0.14);
  if(Math.abs(etCur-lastBuilt)>0.004 && lensA){ const ga=lensA.geometry,gb=lensB.geometry; lensA.geometry=buildLensGeo(etCur); lensB.geometry=buildLensGeo(etCur); ga.dispose();gb.dispose(); lastBuilt=etCur; }
  // tween de cámara (¾ ↔ canto)
  if(camTw){ const k=clamp((performance.now()-camTw.t0)/camTw.dur,0,1), e=easeIO(k);
    camAz=lerp(camTw.fromAz,camTw.toAz,e); camPo=lerp(camTw.fromPo,camTw.toPo,e); applyCam();
    if(k>=1){ const then=camTw.then; camTw=null; controls.enabled=true; controls.update(); if(then)then(); }
  } else { controls.update(); }
  placeRuler();
  renderer.render(scene,camera);
}

try{ init(); }
catch(err){ console.warn('3D no disponible',err); cv.style.display='none'; document.querySelector('.ctrl').style.display='none'; document.querySelector('.chips').style.display='none'; document.getElementById('load').style.display='none'; document.getElementById('fallback').style.display='flex'; }
</script>
</body>
</html>
