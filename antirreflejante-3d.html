<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Antirreflejante 3D · Car & Era</title>
<style>
  :root{ --beige:#b3895a; --ink:#1c1a16; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0e1116;font-family:'Outfit',system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none}
  #wrap{position:relative;width:100%;height:100%}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .ui{position:absolute;inset:0;pointer-events:none;z-index:5}
  .tag{position:absolute;bottom:64px;font-size:11px;font-weight:700;color:#fff;background:rgba(12,14,18,.5);padding:4px 9px;border-radius:8px;backdrop-filter:blur(4px)}
  .tag-l{left:5%}.tag-r{right:5%}
  .read{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:11.5px;font-weight:600;color:#fff;background:rgba(12,14,18,.5);padding:4px 12px;border-radius:9px;text-align:center}
  .grab{position:absolute;font-size:10.5px;color:#fff;background:rgba(179,137,90,.92);padding:4px 9px;border-radius:8px;transform:translate(-50%,-150%);white-space:nowrap;transition:opacity .3s;z-index:7}
  .ctrl{position:absolute;left:0;right:0;bottom:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(10,12,16,.85) 40%);pointer-events:auto;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .tip{font-size:11px;color:#cbbfae}
  .seg{display:inline-flex;background:rgba(255,255,255,.14);border-radius:100px;padding:3px}
  .seg button{border:none;background:none;color:#d7ccbb;font-family:inherit;font-weight:600;font-size:11.5px;padding:8px 12px;border-radius:100px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink)}
  .fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#cbbfae;font-size:13px;text-align:center;padding:24px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div class="ui">
    <div class="read" id="read">Mueve la luz sobre los lentes</div>
    <div class="tag tag-l" id="tagL">Sin AR</div>
    <div class="tag tag-r" id="tagR">Con AR</div>
    <div class="grab" id="grab" style="opacity:0">Arrastra la luz 💡</div>
  </div>
  <div class="ctrl">
    <span class="tip">Arrastra la luz · gira con el dedo</span>
    <span class="seg"><button id="mBoth" class="on">Comparar</button><button id="mSin">Sin AR</button><button id="mCon">Con AR</button></span>
  </div>
  <div class="fallback" id="fallback">Tu dispositivo no pudo cargar la vista 3D.<br>El antirreflejante quita el reflejo del lente y deja ver los ojos.</div>
</div>

<script type="importmap">
{ "imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

let renderer,scene,camera,controls,lampLight,lamp,glareL,glareR,matL,matR;
const cv=document.getElementById('cv');
let running=true,raf=0,mode='both',draggingLamp=false;
let lampU=0.30, lampV=0.72;  // posición normalizada de la luz (0..1)
const lerp=(a,b,k)=>a+(b-a)*k, clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function radialTex(stops){
  const s=64,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');
  const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  stops.forEach(([o,col])=>g.addColorStop(o,col));
  x.fillStyle=g;x.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
}
const TEX_WHITE=()=>radialTex([[0,'rgba(255,255,255,1)'],[0.45,'rgba(255,255,255,0.7)'],[1,'rgba(255,255,255,0)']]);
const TEX_AR   =()=>radialTex([[0,'rgba(150,220,170,0.9)'],[0.5,'rgba(150,200,255,0.4)'],[1,'rgba(150,200,255,0)']]);

function makeEye(x){
  const g=new THREE.Group();
  const sclera=new THREE.Mesh(new THREE.SphereGeometry(0.26,32,32),new THREE.MeshStandardMaterial({color:'#f3f1ee',roughness:.5}));
  const iris=new THREE.Mesh(new THREE.SphereGeometry(0.135,32,32),new THREE.MeshStandardMaterial({color:'#5b4733',roughness:.45}));
  iris.position.z=0.17; iris.scale.set(1,1,0.5);
  const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.06,24,24),new THREE.MeshStandardMaterial({color:'#0d0b09'}));
  pupil.position.z=0.24; pupil.scale.set(1,1,0.4);
  g.add(sclera,iris,pupil); g.position.set(x,0.06,0.16); return g;
}
function makeLens(x){
  const g=new THREE.Group(); g.position.set(x,0.06,0.66);
  const geo=new THREE.SphereGeometry(0.5,48,40); geo.scale(1,1.18,0.13);
  const mat=new THREE.MeshPhysicalMaterial({color:'#f0f4f6',metalness:0,roughness:.03,
    transmission:0.92,thickness:0.4,ior:1.5,clearcoat:1,clearcoatRoughness:.03,transparent:true,envMapIntensity:1.0});
  const glass=new THREE.Mesh(geo,mat); g.add(glass);
  const rimGeo=new THREE.TorusGeometry(0.5,0.035,16,64); rimGeo.scale(1,1.18,1);
  g.add(new THREE.Mesh(rimGeo,new THREE.MeshStandardMaterial({color:'#23232a',metalness:.9,roughness:.3})));
  const glare=new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_WHITE(),transparent:true,opacity:.85,depthWrite:false,depthTest:false,blending:THREE.AdditiveBlending}));
  glare.scale.set(0.8,0.8,1); glare.position.z=0.18; g.add(glare);
  return {group:g,mat,glare};
}

function init(){
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  scene=new THREE.Scene(); scene.background=new THREE.Color('#161a22');
  const pmrem=new THREE.PMREMGenerator(renderer);
  scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

  camera=new THREE.PerspectiveCamera(36,1,0.1,100); camera.position.set(0,0.1,5.6);
  controls=new OrbitControls(camera,cv);
  controls.enableDamping=true; controls.dampingFactor=.09; controls.enablePan=false; controls.enableZoom=false;
  controls.minPolarAngle=Math.PI*0.36; controls.maxPolarAngle=Math.PI*0.62;
  controls.minAzimuthAngle=-Math.PI*0.24; controls.maxAzimuthAngle=Math.PI*0.24;

  scene.add(new THREE.HemisphereLight('#dfe8ff','#2a2620',0.55));
  const key=new THREE.DirectionalLight('#fff',0.5); key.position.set(0,2,4); scene.add(key);
  lampLight=new THREE.PointLight('#fff7e6',26,30,2); scene.add(lampLight);

  // rostro
  const head=new THREE.Mesh(new THREE.SphereGeometry(1.35,48,48),new THREE.MeshStandardMaterial({color:'#d9a884',roughness:.85}));
  head.scale.set(1,1.22,0.82); head.position.set(0,0,-0.55); scene.add(head);
  const nose=new THREE.Mesh(new THREE.SphereGeometry(0.16,24,24),new THREE.MeshStandardMaterial({color:'#cf9d79',roughness:.85}));
  nose.position.set(0,-0.2,0.42); nose.scale.set(0.7,1.1,0.8); scene.add(nose);
  [-0.62,0.62].forEach((bx,i)=>{ const brow=new THREE.Mesh(new THREE.BoxGeometry(0.42,0.07,0.12),new THREE.MeshStandardMaterial({color:'#5b4128',roughness:.8})); brow.position.set(bx,0.44,0.32); brow.rotation.z=(i?1:-1)*0.06; scene.add(brow); });
  scene.add(makeEye(-0.62)); scene.add(makeEye(0.62));

  const L=makeLens(-0.62), R=makeLens(0.62);
  glareL=L.glare; matL=L.mat; glareR=R.glare; matR=R.mat;
  scene.add(L.group); scene.add(R.group);

  // lámpara
  lamp=new THREE.Mesh(new THREE.SphereGeometry(0.16,24,24),new THREE.MeshBasicMaterial({color:'#fff2c0'}));
  const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:TEX_WHITE(),color:'#ffe9a8',transparent:true,opacity:.8,depthWrite:false,blending:THREE.AdditiveBlending}));
  halo.scale.set(2.1,2.1,1); lamp.add(halo); scene.add(lamp);

  cv.addEventListener('pointerdown',onDown);
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',()=>{ draggingLamp=false; controls.enabled=true; });
  document.getElementById('mBoth').onclick=()=>setMode('both');
  document.getElementById('mSin').onclick=()=>setMode('sin');
  document.getElementById('mCon').onclick=()=>setMode('con');
  document.addEventListener('visibilitychange',()=>{ running=!document.hidden; if(running) loop(); });

  resize(); window.addEventListener('resize',resize);
  setMode('both'); updateLamp();
  const grab=document.getElementById('grab');
  setTimeout(()=>grab.style.opacity=1,600); setTimeout(()=>grab.style.opacity=0,4200);
  loop();
}

function lensAR(glare,mat,hasAR){
  if(hasAR){
    glare.material.map=TEX_AR(); glare.material.opacity=0.22; glare.material.blending=THREE.NormalBlending; glare.scale.set(0.34,0.34,1);
    mat.envMapIntensity=0.5; mat.iridescence=0.7; mat.iridescenceIOR=1.3; mat.clearcoat=0.6;
  } else {
    glare.material.map=TEX_WHITE(); glare.material.opacity=0.9; glare.material.blending=THREE.AdditiveBlending; glare.scale.set(0.82,0.82,1);
    mat.envMapIntensity=1.5; mat.iridescence=0; mat.clearcoat=1;
  }
  glare.material.needsUpdate=true; mat.needsUpdate=true;
}
function setMode(m){
  mode=m;
  document.getElementById('mBoth').classList.toggle('on',m==='both');
  document.getElementById('mSin').classList.toggle('on',m==='sin');
  document.getElementById('mCon').classList.toggle('on',m==='con');
  const arL = (m==='con'), arR = (m!=='sin');
  lensAR(glareL,matL,arL); lensAR(glareR,matR,arR);
  document.getElementById('tagL').textContent = arL?'Con AR':'Sin AR';
  document.getElementById('tagR').textContent = arR?'Con AR':'Sin AR';
  document.getElementById('read').textContent = m==='both'?'Compara: izquierda Sin AR · derecha Con AR' : (m==='sin'?'Sin AR: el reflejo tapa los ojos':'Con AR: los ojos se ven claramente');
}

function updateLamp(){
  const x=lerp(-2.6,2.6,lampU), y=lerp(1.55,-0.25,1-lampV);
  lamp.position.set(x,y,1.3); lampLight.position.set(x,y,1.7);
  // reflejo se mueve en el lente según la luz
  const ox=clamp((x)*0.07,-0.22,0.22), oy=clamp((y-0.2)*0.07,-0.22,0.22);
  if(glareL){ glareL.position.set(ox,oy,0.18); }
  if(glareR){ glareR.position.set(ox,oy,0.18); }
}

const ray=new THREE.Raycaster(),ndc=new THREE.Vector2();
function ptNDC(e){ const r=cv.getBoundingClientRect(); ndc.x=((e.clientX-r.left)/r.width)*2-1; ndc.y=-((e.clientY-r.top)/r.height)*2+1; }
function onDown(e){ ptNDC(e); ray.setFromCamera(ndc,camera); if(ray.intersectObject(lamp,true).length){ draggingLamp=true; controls.enabled=false; } }
function onMove(e){ if(!draggingLamp) return; ptNDC(e); lampU=clamp(ndc.x*0.5+0.5,0,1); lampV=clamp(ndc.y*0.5+0.5,0,1); updateLamp(); }

function resize(){
  const w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight;
  renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix();
  const halfW=2.0,halfH=1.65,vFov=camera.fov*Math.PI/180;
  const d=Math.max(halfH/Math.tan(vFov/2),halfW/(Math.tan(vFov/2)*camera.aspect))*1.12;
  const dv=camera.position.clone().sub(controls.target); if(dv.lengthSq()<1e-4)dv.set(0,0,1); dv.normalize();
  camera.position.copy(controls.target).addScaledVector(dv,d); controls.update();
}
function loop(){ if(!running)return; raf=requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); }

try{ init(); }
catch(err){ console.warn('3D no disponible',err); cv.style.display='none'; document.querySelector('.ctrl').style.display='none'; document.getElementById('fallback').style.display='flex'; }
</script>
</body>
</html>
