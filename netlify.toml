[build]
  command = "if [ \"$PX_SITE\" = \"1\" ]; then cp preregistro.html index.html; fi"
  functions = "netlify/functions"

[build.processing]
  skip_processing = true

# LC CRM auto-reminder — runs daily at 10:00 AM CST (16:00 UTC)
[functions."lc-cron"]
  schedule = "0 16 * * *"

# Review/NPS — procesa cola de encuestas cada 15 min (se encolan 2h después de entrega)
[functions."review-cron"]
  schedule = "*/15 * * * *"

# Magnolia Reactivation — DESACTIVADO (lista SICAR se envía manualmente una sola vez)
# [functions."magnolia-reactivate"]
#   schedule = "0 17 * * 1"

# LC Reactivation — envío MANUAL: GET /.netlify/functions/lc-reactivate?key=SECRET
# Dry run: ?key=SECRET&dry=1 — A/B/C test con 3 templates (136 contactos LC dormidos)

# VIP Reactivation — envío MANUAL: GET /.netlify/functions/vip-reactivate?key=SECRET
# Dry run: ?key=SECRET&dry=1 — A/B/C test con 3 templates (418 contactos VIP dormidos 2024)
# Ambas funciones sin cron — se disparan manualmente cuando Angel lo decida

# Review Follow-up — DESACTIVADO (muy insistente, con links directos g.page ya no es necesario)
# [functions."review-followup"]
#   schedule = "0 17 * * 3"

# Promo Follow-up Abril — 2 runs para cubrir 82 contactos (50/run), dedup automático
# Desactivar después de abril 1
[functions."promo-followup"]
  schedule = "0,30 17 * * *"

# Audit Cron — inventory audit every ~5 days at 11:00 AM CST (17:00 UTC)
[functions."audit-cron"]
  schedule = "0 17 1,6,11,16,21,26 * *"

# Asistencia — checks missing check-ins every 30 min (10am-12pm CST = 16-18 UTC)
[functions."asistencia-cron"]
  schedule = "*/30 16-18 * * *"

# Firma asistencia page
[[redirects]]
  from = "/firma-asistencia"
  to = "/firma-asistencia.html"
  status = 200

# Promo Marzo 2026 — static landing with pixels
[[redirects]]
  from = "/l/promo-marzo"
  to = "/promo-marzo.html"
  status = 200

# Dynamic landing pages: /l/slug → function
[[redirects]]
  from = "/l/*"
  to = "/.netlify/functions/landing"
  status = 200

# Tienda online LC
[[redirects]]
  from = "/tienda"
  to = "/tienda.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://api.anthropic.com https://api.payclip.com https://api.twilio.com https://graph.facebook.com https://accounts.google.com https://apis.google.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://www.facebook.com 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; connect-src *;"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Cache-Control = "no-cache, no-store, must-revalidate"
